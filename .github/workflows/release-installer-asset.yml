name: release-installer-asset

on:
  push:
    tags:
      - "CancerBroker-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update for the standalone installer asset"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-installer-asset-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  upload-installer-asset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release tag
        id: release_tag
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install installer package dependencies
        run: bun install
        working-directory: packaging/npm/opencode-session-memory-sidebar-installer

      - name: Install plugin package dependencies
        run: bun install
        working-directory: packaging/npm/opencode-session-memory-sidebar

      - name: Build plugin asset
        run: bun run build:standalone
        working-directory: packaging/npm/opencode-session-memory-sidebar

      - name: Build standalone installer asset
        run: bun run build:standalone
        working-directory: packaging/npm/opencode-session-memory-sidebar-installer

      - name: Smoke test plugin asset
        run: |
          TMP_DIR="$(mktemp -d)"
          cp ./dist/session_memory.js "$TMP_DIR/session_memory.js"
          bun -e "import('file://$TMP_DIR/session_memory.js').then((mod) => { if (typeof mod.default?.execute !== 'function') throw new Error('tool execute missing') })"
        working-directory: packaging/npm/opencode-session-memory-sidebar

      - name: Smoke test standalone installer asset
        run: |
          TMP_DIR="$(mktemp -d)"
          OPENCODE_SESSION_MEMORY_TOOL_URL="file://$GITHUB_WORKSPACE/packaging/npm/opencode-session-memory-sidebar/dist/session_memory.js" node ./dist/CancerBroker.cjs --config "$TMP_DIR/opencode.json"
          OPENCODE_SESSION_MEMORY_TOOL_URL="file://$GITHUB_WORKSPACE/packaging/npm/opencode-session-memory-sidebar/dist/session_memory.js" node ./dist/CancerBroker.cjs uninstall --config "$TMP_DIR/opencode.json"
        working-directory: packaging/npm/opencode-session-memory-sidebar-installer

      - name: Verify release metadata consistency
        run: node ./scripts/verify-installer-release.mjs --tag "${{ steps.release_tag.outputs.tag }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.release_tag.outputs.tag }}" >/dev/null 2>&1 \
            && gh release upload "${{ steps.release_tag.outputs.tag }}" packaging/npm/opencode-session-memory-sidebar-installer/dist/CancerBroker.cjs packaging/npm/opencode-session-memory-sidebar/dist/session_memory.js --clobber \
            || gh release create "${{ steps.release_tag.outputs.tag }}" packaging/npm/opencode-session-memory-sidebar-installer/dist/CancerBroker.cjs packaging/npm/opencode-session-memory-sidebar/dist/session_memory.js --generate-notes --title "${{ steps.release_tag.outputs.tag }}"

      - name: Verify published release asset
        run: node ./scripts/verify-installer-release.mjs --tag "${{ steps.release_tag.outputs.tag }}" --check-remote
