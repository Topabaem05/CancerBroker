mode = "observe"

[completion]
enabled_sources = ["status", "idle", "tool_part_completed", "error", "deleted", "inferred"]
dedupe_ttl_secs = 600
cleanup_retry_interval_secs = 15
reconciliation_interval_secs = 60
daemon_socket_path = "/tmp/cancerbroker-completion.sock"
state_path = "/tmp/cancerbroker-completion-state.json"
